<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IndianJOEla — The Bachelor Party</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- Comic halftone / burst backdrop -->
  <div class="backdrop" aria-hidden="true">
    <div class="rays"></div>
    <div class="halftone"></div>
  </div>

  <header class="masthead">
    <!-- THE TITLE -->
    <h1 class="title" aria-label="IndianJOEla">
      <span class="title__part">Indian</span><span class="title__joe">J</span><!--
   --><span class="title__joe">
        <!-- The famous "O" PORTAL with cartoon Joe popping out -->
        <span class="portal" role="img" aria-label="Cartoon of Joe popping out of the letter O">
          <span class="portal__ring"></span>

          <!-- ===================== CARTOON JOE ===================== -->
          <svg class="joe" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <clipPath id="portalClip">
                <circle cx="150" cy="150" r="138" />
              </clipPath>
            </defs>

            <g clip-path="url(#portalClip)">
              <!-- Hand-drawn cartoon Joe — flat cel colors + bold ink line.
                   Drawn back-to-front. Default ink: #2a2018 -->
              <g class="joe__body"
                 stroke="#2a2018" stroke-width="5"
                 stroke-linejoin="round" stroke-linecap="round">

                <!-- ===== OLIVE JACKET / SHOULDERS ===== -->
                <path d="M30 300 V266 Q46 228 98 215 Q126 207 150 209 Q174 207 202 215 Q254 228 270 266 V300 Z"
                      fill="#5f6b3c"/>
                <!-- lapel/collar creases -->
                <path d="M150 212 L116 250 M150 212 L184 250" fill="none" stroke="#414a27" stroke-width="4"/>

                <!-- ===== BLACK TEE ===== -->
                <path d="M120 218 Q150 246 180 218 L184 258 Q150 276 116 258 Z" fill="#191919"/>
                <!-- gold chain -->
                <path d="M124 224 Q150 252 176 224" fill="none" stroke="#e9c33b" stroke-width="4"/>

                <!-- ===== NECK ===== -->
                <path d="M122 196 Q150 220 178 196 V220 Q150 238 122 220 Z" fill="#f2bd92"/>
                <path d="M122 200 Q150 220 178 200" fill="none" stroke="#d39a6a" stroke-width="3"/>

                <!-- ===== EARS ===== -->
                <path d="M82 148 Q62 144 64 166 Q68 182 86 174 Z" fill="#f2bd92"/>
                <path d="M218 148 Q238 144 236 166 Q232 182 214 174 Z" fill="#f2bd92"/>
                <path d="M74 158 Q82 160 84 168" fill="none" stroke="#d39a6a" stroke-width="3"/>
                <path d="M226 158 Q218 160 216 168" fill="none" stroke="#d39a6a" stroke-width="3"/>

                <!-- ===== SIDEBURNS (dark hair before ears) ===== -->
                <path d="M86 126 Q82 152 94 172 Q80 162 76 138 Z" fill="#2a2018" stroke="none"/>
                <path d="M214 126 Q218 152 206 172 Q220 162 224 138 Z" fill="#2a2018" stroke="none"/>

                <!-- ===== HEAD / FACE ===== -->
                <path d="M78 110 Q72 158 100 206 Q120 246 150 252 Q180 246 200 206 Q228 158 222 110 Q150 96 78 110 Z"
                      fill="#f2bd92"/>
                <!-- cel shadow down the right cheek/jaw -->
                <path d="M198 116 Q220 160 192 208 Q180 232 160 244 Q188 232 206 196 Q224 156 214 114 Z"
                      fill="#e3a373" stroke="none" opacity="0.65"/>
                <!-- shadow cast by the brim -->
                <path d="M92 122 Q150 112 208 122 Q150 134 92 122 Z"
                      fill="#e3a373" stroke="none" opacity="0.55"/>

                <!-- ===== CHEEK BLUSH (from the big grin) ===== -->
                <ellipse cx="102" cy="186" rx="15" ry="10" fill="#ef9b7a" stroke="none" opacity="0.5"/>
                <ellipse cx="198" cy="186" rx="15" ry="10" fill="#ef9b7a" stroke="none" opacity="0.5"/>

                <!-- ===== EYEBROWS — thick, dark, raised (joyful) ===== -->
                <path d="M96 134 Q116 118 142 128 Q118 126 102 140 Z" fill="#2a2018" stroke-width="2"/>
                <path d="M204 134 Q184 118 158 128 Q182 126 198 140 Z" fill="#2a2018" stroke-width="2"/>

                <!-- ===== EYES — open, bright, happy ===== -->
                <g class="joe__eyes">
                  <!-- left -->
                  <path d="M102 150 Q122 140 142 150 Q124 162 102 150 Z" fill="#fff" stroke-width="4"/>
                  <circle cx="122" cy="150" r="6.5" fill="#2a2018" stroke="none"/>
                  <circle cx="124.5" cy="147.5" r="2.2" fill="#fff" stroke="none"/>
                  <!-- right -->
                  <path d="M158 150 Q178 140 198 150 Q180 162 158 150 Z" fill="#fff" stroke-width="4"/>
                  <circle cx="178" cy="150" r="6.5" fill="#2a2018" stroke="none"/>
                  <circle cx="180.5" cy="147.5" r="2.2" fill="#fff" stroke="none"/>
                </g>

                <!-- ===== NOSE ===== -->
                <path d="M150 156 Q157 174 150 184 Q143 188 136 182"
                      fill="none" stroke="#d39a6a" stroke-width="4"/>

                <!-- ===== BIG OPEN GRIN ===== -->
                <!-- mouth interior -->
                <path d="M104 196 Q150 204 196 196 Q182 244 150 244 Q118 244 104 196 Z" fill="#7c2230"/>
                <!-- upper teeth row -->
                <path d="M110 198 Q150 205 190 198 Q150 218 110 198 Z" fill="#fff" stroke="none"/>
                <path d="M131 199 V212 M150 200 V214 M169 199 V212"
                      fill="none" stroke="#d9d9d9" stroke-width="1.6"/>
                <!-- tongue -->
                <path d="M126 230 Q150 222 174 230 Q166 244 150 244 Q134 244 126 230 Z"
                      fill="#e06d72" stroke="none"/>
                <!-- bold mouth outline over everything -->
                <path d="M104 196 Q150 204 196 196 Q182 244 150 244 Q118 244 104 196 Z"
                      fill="none" stroke-width="5.5"/>
                <!-- grin creases / dimples -->
                <path d="M96 182 Q96 196 106 206" fill="none" stroke="#d39a6a" stroke-width="3"/>
                <path d="M204 182 Q204 196 194 206" fill="none" stroke="#d39a6a" stroke-width="3"/>

                <!-- ===================== NAVY CAP ===================== -->
                <!-- curved bill (sits above the brows) -->
                <path d="M80 112 Q150 124 220 112 Q228 126 184 132 Q150 137 116 132 Q72 126 80 112 Z"
                      fill="#16223c"/>
                <!-- crown / dome -->
                <path d="M76 114 Q60 50 150 32 Q240 50 224 114 Q150 100 76 114 Z" fill="#24375c"/>
                <!-- panel seams -->
                <path d="M150 33 Q150 70 150 102" fill="none" stroke="#16223c" stroke-width="3" opacity="0.7"/>
                <path d="M106 44 Q118 74 121 100" fill="none" stroke="#16223c" stroke-width="2.5" opacity="0.6"/>
                <path d="M194 44 Q182 74 179 100" fill="none" stroke="#16223c" stroke-width="2.5" opacity="0.6"/>
                <!-- top button -->
                <circle cx="150" cy="34" r="5" fill="#16223c" stroke-width="2"/>
                <!-- crown highlight -->
                <path d="M90 74 Q120 50 160 50" fill="none" stroke="#3c5a85" stroke-width="5" opacity="0.7"/>
                <!-- cursive red R on the front-left panel -->
                <text x="130" y="98" text-anchor="middle"
                      font-family="'Luckiest Guy','Bangers',cursive"
                      font-size="54" fill="#e01f1f" stroke="#8a1414" stroke-width="2"
                      transform="rotate(-13 130 80)">R</text>
              </g>
            </g>

            <!-- inner ring shadow of the portal -->
            <circle cx="150" cy="150" r="135" fill="none" stroke="rgba(0,0,0,0.35)" stroke-width="8"/>
          </svg>
          <!-- =================== /CARTOON JOE =================== -->
        </span>
      </span><!--
   --><span class="title__part title__part--la">la</span>
    </h1>
  </header>

  <!-- Page content will be built out below. -->
  <main class="content"></main>

  <script src="js/main.js"></script>
</body>
</html>
