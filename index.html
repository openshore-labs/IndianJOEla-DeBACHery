<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IndianJOEla — The Bachelor Party</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- Comic halftone / burst backdrop -->
  <div class="backdrop" aria-hidden="true">
    <div class="rays"></div>
    <div class="halftone"></div>
  </div>

  <main class="cover">
    <!-- Top "kicker" banner -->
    <div class="kicker">
      <span class="kicker__star">★</span>
      Joe's Bachelor Party
      <span class="kicker__star">★</span>
    </div>

    <!-- THE TITLE -->
    <h1 class="title" aria-label="IndianJOEla">
      <span class="title__part">Indian</span><span class="title__joe">J</span><!--
   --><span class="title__joe">
        <!-- The famous "O" PORTAL with cartoon Joe popping out -->
        <span class="portal" role="img" aria-label="Cartoon of Joe popping out of the letter O">
          <span class="portal__ring"></span>

          <!-- ===================== CARTOON JOE ===================== -->
          <svg class="joe" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <clipPath id="portalClip">
                <circle cx="150" cy="150" r="138" />
              </clipPath>
              <radialGradient id="skin" cx="45%" cy="40%" r="70%">
                <stop offset="0%" stop-color="#ffd9b8" />
                <stop offset="70%" stop-color="#f0b389" />
                <stop offset="100%" stop-color="#e09a6c" />
              </radialGradient>
              <linearGradient id="capTop" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#243a63" />
                <stop offset="100%" stop-color="#16243f" />
              </linearGradient>
              <linearGradient id="capBrim" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#1c2c4c" />
                <stop offset="100%" stop-color="#0e1729" />
              </linearGradient>
            </defs>

            <g clip-path="url(#portalClip)">
              <!-- Everything that pops out of the O -->
              <g class="joe__body">
                <!-- Shoulders / olive jacket -->
                <path d="M40 300 V255 q15 -55 60 -70 q50 -16 100 0 q45 15 60 70 V300 Z"
                      fill="#5d6b3f" stroke="#1a1a1a" stroke-width="6" stroke-linejoin="round"/>
                <path d="M150 188 v112" stroke="#3f4a2c" stroke-width="6" stroke-linecap="round"/>
                <!-- black tee collar -->
                <path d="M118 205 q32 34 64 0 l0 30 q-32 26 -64 0 Z" fill="#171717"/>
                <!-- gold chain hint -->
                <path d="M122 214 q28 30 56 0" fill="none" stroke="#e9c33b" stroke-width="4" stroke-linecap="round"/>

                <!-- NECK -->
                <path d="M122 196 q28 24 56 0 v18 q-28 22 -56 0 Z" fill="url(#skin)" stroke="#b9744a" stroke-width="3"/>

                <!-- HEAD -->
                <path d="M86 132
                         q-4 -52 64 -54
                         q68 2 64 54
                         q3 40 -14 66
                         q-18 30 -50 30
                         q-32 0 -50 -30
                         q-17 -26 -14 -66 Z"
                      fill="url(#skin)" stroke="#1a1a1a" stroke-width="6" stroke-linejoin="round"/>

                <!-- ears -->
                <path d="M86 138 q-16 0 -14 18 q2 16 18 12 Z" fill="url(#skin)" stroke="#1a1a1a" stroke-width="5"/>
                <path d="M214 138 q16 0 14 18 q-2 16 -18 12 Z" fill="url(#skin)" stroke="#1a1a1a" stroke-width="5"/>

                <!-- light stubble shading on jaw -->
                <path d="M104 196 q46 40 92 0 q-10 30 -46 32 q-36 -2 -46 -32 Z"
                      fill="#cf8a5c" opacity="0.45"/>

                <!-- sideburn / hair edges peeking under cap -->
                <path d="M88 120 q-3 22 4 40 q-14 -10 -12 -34 Z" fill="#2a2018"/>
                <path d="M212 120 q3 22 -4 40 q14 -10 12 -34 Z" fill="#2a2018"/>

                <!-- EYEBROWS — thick & dark -->
                <path d="M104 120 q22 -16 44 -4 q-22 -4 -44 8 Z" fill="#2a2018"/>
                <path d="M196 120 q-22 -16 -44 -4 q22 -4 44 8 Z" fill="#2a2018"/>

                <!-- EYES — happy squint -->
                <g class="joe__eyes">
                  <path d="M110 138 q14 -12 30 -2" fill="none" stroke="#1a1a1a" stroke-width="6" stroke-linecap="round"/>
                  <path d="M160 136 q16 -10 30 2" fill="none" stroke="#1a1a1a" stroke-width="6" stroke-linecap="round"/>
                  <circle cx="124" cy="142" r="4.5" fill="#1a1a1a"/>
                  <circle cx="176" cy="142" r="4.5" fill="#1a1a1a"/>
                </g>

                <!-- cheek blush from smiling -->
                <ellipse cx="108" cy="170" rx="13" ry="9" fill="#e98f6b" opacity="0.45"/>
                <ellipse cx="192" cy="170" rx="13" ry="9" fill="#e98f6b" opacity="0.45"/>

                <!-- NOSE -->
                <path d="M150 150 q8 18 -2 30 q-8 4 -12 -2" fill="none" stroke="#b9744a" stroke-width="5" stroke-linecap="round"/>

                <!-- BIG TOOTHY GRIN -->
                <path d="M114 186 q36 40 72 0 q-36 18 -72 0 Z" fill="#7a1d1d"/>
                <path d="M116 186 q34 14 68 0 q-34 8 -68 0 Z" fill="#ffffff"/>
                <path d="M118 187 q32 12 64 0" fill="none" stroke="#d8d8d8" stroke-width="1.5"/>
                <!-- smile outline -->
                <path d="M112 184 q38 44 76 0" fill="none" stroke="#1a1a1a" stroke-width="6" stroke-linecap="round"/>

                <!-- ============ THE NAVY CAP with red "R" ============ -->
                <!-- brim -->
                <path d="M150 92 q-78 -6 -96 30 q-6 14 8 18 q40 -22 88 -22 q48 0 88 22 q14 -4 8 -18 q-18 -36 -96 -30 Z"
                      fill="url(#capBrim)" stroke="#0a0f1c" stroke-width="6" stroke-linejoin="round"/>
                <!-- crown -->
                <path d="M62 104 q-10 -64 88 -66 q98 2 88 66 q-44 -22 -88 -22 q-44 0 -88 22 Z"
                      fill="url(#capTop)" stroke="#0a0f1c" stroke-width="6" stroke-linejoin="round"/>
                <!-- panel seams -->
                <path d="M150 40 V86" stroke="#0d172b" stroke-width="3" opacity="0.7"/>
                <path d="M104 46 q14 24 14 44" stroke="#0d172b" stroke-width="3" opacity="0.6" fill="none"/>
                <path d="M196 46 q-14 24 -14 44" stroke="#0d172b" stroke-width="3" opacity="0.6" fill="none"/>
                <!-- button -->
                <circle cx="150" cy="42" r="5" fill="#0d172b"/>
                <!-- highlight -->
                <path d="M96 58 q40 -22 96 -10" fill="none" stroke="#3a557f" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
                <!-- the cursive red R -->
                <text x="148" y="98" text-anchor="middle"
                      font-family="'Luckiest Guy','Bangers',cursive"
                      font-size="68" fill="#e01f1f" stroke="#7a1414" stroke-width="2"
                      transform="rotate(-10 148 78)">R</text>
              </g>
            </g>

            <!-- inner ring shadow of the portal -->
            <circle cx="150" cy="150" r="135" fill="none" stroke="rgba(0,0,0,0.35)" stroke-width="8"/>
          </svg>
          <!-- =================== /CARTOON JOE =================== -->
        </span>
      </span><!--
   --><span class="title__part title__part--la">la</span>
    </h1>

    <p class="tagline">The Search for the Lost Bachelor</p>

    <!-- Placeholder for the next steps -->
    <button class="enter-btn" type="button">Begin the Adventure</button>

    <footer class="guest-count">★ 20 Brave Adventurers ★</footer>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
